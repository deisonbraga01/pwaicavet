# CI/CD — ICA Med Vet (pacote iOS gerado pelo PWABuilder)
# Repositório Codemagic: github.com/deisonbraga01/pwaicavet
#
# No painel: Environment variables → grupo "icamedvet_ios" → APP_STORE_APPLE_ID
#
# Em Teams → Integrations → App Store Connect, crie a integração e ajuste
# o nome abaixo (padrão comum: codemagic).

workflows:
  icamedvet-ios:
    name: ICA Med Vet iOS
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "Ica Med Vet"

    environment:
      groups:
        - icamedvet_ios

      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.icamedvet

      vars:
        BUNDLE_ID: br.com.icamedvet
        XCODE_WORKSPACE: "ICA Med Vet.xcworkspace"
        XCODE_SCHEME: "ICA Med Vet"
        # APP_STORE_APPLE_ID: defina só na aba Environment variables do app (não use 0 aqui)

      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Instalar CocoaPods
        working_directory: src
        script: pod install

      - name: Configurar assinatura de código
        working_directory: src
        script: xcode-project use-profiles

      - name: Atualizar build number
        working_directory: src
        script: |
          #!/bin/sh
          set -e
          if [ -n "$APP_STORE_APPLE_ID" ] && [ "$APP_STORE_APPLE_ID" != "0" ]; then
            LATEST=$(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID")
            BUILD_NUMBER=$(($LATEST + 1))
          else
            echo "APP_STORE_APPLE_ID não definido — usando PROJECT_BUILD_NUMBER do Codemagic"
            BUILD_NUMBER=$PROJECT_BUILD_NUMBER
          fi
          agvtool new-version -all $BUILD_NUMBER

      - name: Gerar IPA para App Store
        working_directory: src
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - src/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
